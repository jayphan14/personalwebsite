<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <rect width="600" height="300" fill="#ffffff"/>

  <text x="300" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#333">what our data looks like</text>

  <!-- table -->
  <g font-size="13">
    <!-- header background -->
    <rect x="40" y="50" width="520" height="34" fill="#f2f2ee"/>
    <!-- ε column highlight -->
    <rect x="460" y="50" width="100" height="200" fill="#0b6d5a" fill-opacity="0.08"/>

    <!-- header text -->
    <g fill="#333" font-weight="600" text-anchor="middle">
      <text x="85"  y="72">price</text>
      <text x="180" y="72">size</text>
      <text x="270" y="72">bedrooms</text>
      <text x="365" y="72">bathrooms</text>
      <text x="510" y="72">ε  (noise)</text>
    </g>

    <!-- row dividers -->
    <g stroke="#e0e0d8" stroke-width="1">
      <line x1="40" y1="84"  x2="560" y2="84"/>
      <line x1="40" y1="117" x2="560" y2="117"/>
      <line x1="40" y1="150" x2="560" y2="150"/>
      <line x1="40" y1="183" x2="560" y2="183"/>
      <line x1="40" y1="216" x2="560" y2="216"/>
      <line x1="40" y1="250" x2="560" y2="250"/>
    </g>
    <!-- column divider before ε -->
    <line x1="460" y1="50" x2="460" y2="250" stroke="#d5d5cf" stroke-width="1"/>

    <!-- data rows -->
    <g fill="#333" text-anchor="middle">
      <text x="85"  y="106">$520k</text><text x="180" y="106">1,450</text><text x="270" y="106">3</text><text x="365" y="106">2</text><text x="510" y="106" fill="#0b6d5a">+12k</text>

      <text x="85"  y="139">$780k</text><text x="180" y="139">2,100</text><text x="270" y="139">4</text><text x="365" y="139">3</text><text x="510" y="139" fill="#0b6d5a">−8k</text>

      <text x="85"  y="172">$395k</text><text x="180" y="172">1,100</text><text x="270" y="172">2</text><text x="365" y="172">1</text><text x="510" y="172" fill="#0b6d5a">−5k</text>

      <text x="85"  y="205">$1.10M</text><text x="180" y="205">3,300</text><text x="270" y="205">5</text><text x="365" y="205">3</text><text x="510" y="205" fill="#0b6d5a">+22k</text>

      <text x="85"  y="238">$650k</text><text x="180" y="238">1,850</text><text x="270" y="238">3</text><text x="365" y="238">2</text><text x="510" y="238" fill="#0b6d5a">−14k</text>
    </g>

    <!-- ellipsis row -->
    <text x="300" y="272" text-anchor="middle" fill="#999" font-size="14">…</text>
  </g>
</svg>
