<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="100%" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <rect width="600" height="360" fill="#ffffff"/>

  <text x="300" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#333">House size vs. price</text>

  <!-- grid -->
  <g stroke="#eee" stroke-width="1">
    <line x1="160" y1="50" x2="160" y2="300"/>
    <line x1="240" y1="50" x2="240" y2="300"/>
    <line x1="320" y1="50" x2="320" y2="300"/>
    <line x1="400" y1="50" x2="400" y2="300"/>
    <line x1="480" y1="50" x2="480" y2="300"/>
    <line x1="80" y1="225" x2="560" y2="225"/>
    <line x1="80" y1="188" x2="560" y2="188"/>
    <line x1="80" y1="151" x2="560" y2="151"/>
    <line x1="80" y1="114" x2="560" y2="114"/>
    <line x1="80" y1="77"  x2="560" y2="77"/>
  </g>

  <!-- axes -->
  <line x1="80" y1="300" x2="560" y2="300" stroke="#444" stroke-width="1.3"/>
  <line x1="80" y1="300" x2="80"  y2="50"  stroke="#444" stroke-width="1.3"/>

  <!-- x ticks -->
  <g font-size="11" fill="#666" text-anchor="middle">
    <text x="160" y="318">1.5k</text>
    <text x="240" y="318">2k</text>
    <text x="320" y="318">2.5k</text>
    <text x="400" y="318">3k</text>
    <text x="480" y="318">3.5k</text>
  </g>

  <!-- y ticks (price in $k) -->
  <g font-size="11" fill="#666" text-anchor="end">
    <text x="73" y="229">400k</text>
    <text x="73" y="192">600k</text>
    <text x="73" y="155">800k</text>
    <text x="73" y="118">1M</text>
    <text x="73" y="81">1.2M</text>
  </g>

  <!-- regression line -->
  <line x1="80" y1="240" x2="560" y2="65" stroke="#d4506b" stroke-width="2"/>

  <!-- scatter points -->
  <g fill="#0b6d5a">
    <circle cx="96"  cy="233" r="4"/>
    <circle cx="128" cy="216" r="4"/>
    <circle cx="160" cy="211" r="4"/>
    <circle cx="192" cy="189" r="4"/>
    <circle cx="224" cy="196" r="4"/>
    <circle cx="256" cy="166" r="4"/>
    <circle cx="288" cy="170" r="4"/>
    <circle cx="320" cy="148" r="4"/>
    <circle cx="352" cy="137" r="4"/>
    <circle cx="384" cy="144" r="4"/>
    <circle cx="416" cy="111" r="4"/>
    <circle cx="448" cy="118" r="4"/>
    <circle cx="480" cy="96"  r="4"/>
    <circle cx="512" cy="88"  r="4"/>
    <circle cx="544" cy="68"  r="4"/>
  </g>

  <!-- axis labels -->
  <text x="320" y="342" text-anchor="middle" font-size="12" fill="#555">size (sq ft)</text>
  <text x="22" y="175" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90 22 175)">price</text>
</svg>
